{% extends "base.html" %}
{% block title %}Add listing · BidBud-NG{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Add a listing</h1>

<form class="card bg-base-100 shadow" hx-post="/listings/preview" hx-target="#preview"
      hx-swap="innerHTML">
  <div class="card-body flex flex-col gap-3">
    <label class="form-control w-full">
      <div class="label py-1"><span class="label-text">TradeMe listing URL or number</span></div>
      <input name="url" class="input input-bordered w-full"
             placeholder="https://www.trademe.co.nz/a/.../listing/6006426545"
             required>
    </label>
    <div>
      <button class="btn btn-primary">Look up listing →</button>
    </div>
    <p class="text-xs text-base-content/60">We read the listing's current price, closing time and minimum
      next bid so you can set your maximum and strategy.</p>
  </div>
</form>

<div id="preview" class="mt-4"></div>
{% endblock %}

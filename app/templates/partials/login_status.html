{% if logged_in %}
  <span class="badge badge-success gap-1" title="member {{ member_id }}">● Logged in</span>
{% elif login.busy %}
  <span class="badge badge-warning gap-1">● {{ login.state.replace('_',' ') }}</span>
{% else %}
  <a class="badge badge-error gap-1" href="/login">● Not logged in</a>
{% endif %}

{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between gap-4 mb-4">
  <h1 class="text-2xl font-bold">Watched auctions</h1>
  <a class="btn btn-primary" href="/add">+ Add listing</a>
</div>

{% if not logged_in %}
<div class="alert alert-warning mb-4">
  <span>
    You're not logged in to TradeMe — bids won't be placed until you
    <a class="link link-hover font-semibold" href="/login">log in</a>.
  </span>
</div>
{% endif %}

<div hx-get="/partials/jobs" hx-trigger="load, every 3s" hx-swap="innerHTML">
  {% include "partials/jobs_table.html" %}
</div>
{% endblock %}

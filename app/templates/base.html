<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BidBud-NG{% endblock %}</title>
  <!-- daisyUI (components + light theme) -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css"
        rel="stylesheet" type="text/css">
  <!-- Tailwind utilities -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"
          integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"
          crossorigin="anonymous"></script>
</head>
<body class="min-h-screen bg-base-200 text-base-content flex flex-col">
  <header class="navbar bg-base-100 shadow-sm px-4 sm:px-6">
    <div class="flex-1">
      <a class="text-xl font-bold" href="/">BidBud<span class="text-primary">-NG</span></a>
    </div>
    <nav class="flex items-center gap-1">
      <ul class="menu menu-horizontal hidden sm:flex gap-1 px-1">
        <li><a href="/">Dashboard</a></li>
        <li><a href="/add">Add listing</a></li>
        <li><a href="/settings">Settings</a></li>
        <li><a href="/login">Account</a></li>
      </ul>
      <div class="ml-1 session"
           hx-get="/login/status" hx-trigger="load, every 5s" hx-swap="innerHTML">
      </div>
    </nav>
  </header>

  <main class="flex-1 w-full max-w-5xl mx-auto px-4 sm:px-6 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer footer-center text-base-content/60 p-6">
    <aside>
      <small>Self-hosted bidding assistant · use with your own authorised account.</small>
    </aside>
  </footer>
</body>
</html>
